name: Vulnerability Check

on:
  pull_request:
    branches: [ main ]
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
      - 'testing/**'
      - 'feat/**'

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26.2'
          check-latest: true

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
